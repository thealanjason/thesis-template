name: Build Thesis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Cache Tectonic packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: tectonic-${{ runner.os }}-${{ hashFiles('thesis.tex') }}
          restore-keys: tectonic-${{ runner.os }}-

      - name: Build thesis
        shell: micromamba-shell {0}
        run: tectonic -X compile thesis.tex

      - name: Push PDF to pdf branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout --orphan pdf
          git reset
          git add -f thesis.pdf
          git commit -m "Update thesis PDF"
          git push --force origin pdf
